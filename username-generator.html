<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Username Generator</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f0ee;
    --surface: #ffffff;
    --border: #c8c8c4;
    --border-strong: #888884;
    --text: #111110;
    --muted: #666662;
    --accent: #111110;
    --btn-bg: #111110;
    --btn-text: #f0f0ee;
    --btn-hover: #333330;
    --loaded: #1a6640;
    --transition: background 0.25s, color 0.25s, border-color 0.25s;
  }

  html.dark {
    --bg: #161614;
    --surface: #1e1e1c;
    --border: #333330;
    --border-strong: #555550;
    --text: #e8e8e4;
    --muted: #888884;
    --accent: #e8e8e4;
    --btn-bg: #e8e8e4;
    --btn-text: #161614;
    --btn-hover: #ccccca;
    --loaded: #4caf78;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', 'Courier New', monospace;
    font-size: 0.875rem;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    transition: var(--transition);
  }

  /* Dark mode toggle */
  .theme-toggle {
    position: fixed;
    top: 1.25rem;
    right: 1.25rem;
    background: transparent;
    border: 1px solid var(--border-strong);
    color: var(--muted);
    font-family: inherit;
    font-size: 0.75rem;
    padding: 0.35rem 0.65rem;
    cursor: pointer;
    transition: var(--transition);
    letter-spacing: 0.05em;
  }
  .theme-toggle:hover { color: var(--text); border-color: var(--text); }

  .container {
    width: 100%;
    max-width: 520px;
  }

  header {
    margin-bottom: 2.5rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1.5rem;
  }

  h1 {
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: var(--text);
  }

  .subtitle {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 0.35rem;
  }

  /* Upload section */
  .upload-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
    margin-bottom: 0.75rem;
  }

  .upload-box {
    border: 1px solid var(--border);
    padding: 0.9rem 1rem;
    cursor: pointer;
    position: relative;
    background: var(--surface);
    transition: var(--transition);
  }

  .upload-box:hover { border-color: var(--border-strong); }
  .upload-box.loaded { border-color: var(--loaded); }

  .upload-box input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .upload-label {
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    display: block;
    margin-bottom: 0.3rem;
  }

  .upload-status {
    font-size: 0.8rem;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .upload-box.loaded .upload-status { color: var(--loaded); }

  .upload-count {
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 0.2rem;
  }

  /* Options */
  .options-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 0.75rem;
    padding: 0.8rem 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    transition: var(--transition);
  }

  .checkbox-wrap {
    display: flex;
    align-items: center;
    gap: 0.55rem;
    cursor: pointer;
    user-select: none;
    flex: 1;
  }

  .checkbox-wrap input[type="checkbox"] {
    appearance: none;
    width: 14px;
    height: 14px;
    border: 1px solid var(--border-strong);
    background: var(--bg);
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
    transition: var(--transition);
  }

  .checkbox-wrap input[type="checkbox"]:checked {
    background: var(--btn-bg);
    border-color: var(--btn-bg);
  }

  .checkbox-wrap input[type="checkbox"]:checked::after {
    content: '';
    position: absolute;
    left: 3px; top: 0px;
    width: 4px; height: 8px;
    border: 1.5px solid var(--btn-text);
    border-top: none;
    border-left: none;
    transform: rotate(45deg);
  }

  .checkbox-wrap span { color: var(--text); }

  .num-range {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.75rem;
    color: var(--muted);
  }

  .num-range input[type="number"] {
    width: 56px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 0.8rem;
    padding: 0.25rem 0.4rem;
    text-align: center;
    transition: var(--transition);
  }

  .num-range input[type="number"]:focus {
    outline: none;
    border-color: var(--border-strong);
  }

  /* Generate button */
  .btn-generate {
    width: 100%;
    padding: 0.85rem;
    background: var(--btn-bg);
    color: var(--btn-text);
    border: 1px solid var(--btn-bg);
    font-family: inherit;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: var(--transition);
    margin-bottom: 0.75rem;
  }

  .btn-generate:hover { background: var(--btn-hover); border-color: var(--btn-hover); }
  .btn-generate:active { opacity: 0.85; }
  .btn-generate:disabled {
    background: transparent;
    border-color: var(--border);
    color: var(--muted);
    cursor: not-allowed;
  }

  /* Result */
  .result-box {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 1rem 1.25rem;
    min-height: 90px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: var(--transition);
  }

  .result-box.has-result { border-color: var(--border-strong); }

  .placeholder-text {
    color: var(--muted);
    font-size: 0.75rem;
    letter-spacing: 0.08em;
  }

  .username-list {
    width: 100%;
    list-style: none;
  }

  .username-item {
    display: flex;
    align-items: center;
    padding: 0.55rem 0;
    border-bottom: 1px solid var(--border);
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.18s, transform 0.18s, border-color 0.25s;
  }

  .username-item:last-child { border-bottom: none; }
  .username-item.show { opacity: 1; transform: translateY(0); }

  .num-label {
    font-size: 0.65rem;
    color: var(--muted);
    width: 1.75rem;
    flex-shrink: 0;
  }

  .username-text {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--text);
    flex: 1;
    padding: 0 0.75rem;
  }

  .copy-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: inherit;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    padding: 0.25rem 0.6rem;
    cursor: pointer;
    transition: var(--transition);
    flex-shrink: 0;
    text-transform: uppercase;
  }

  .copy-btn:hover { border-color: var(--border-strong); color: var(--text); }

  .error-msg {
    color: #c0392b;
    font-size: 0.75rem;
    margin-top: 0.5rem;
  }
</style>
</head>

<button class="theme-toggle" id="themeToggle">dark</button>

<div class="container">
  <header>
    <h1>Username Generator</h1>
    <p class="subtitle">combine adjectives + nouns to generate usernames; use stock lists or upload your own text files, one word per line. runs locally in browser.</p>
  </header>

  <div class="upload-grid">
    <div class="upload-box" id="adjBox">
      <input type="file" id="adjFile" accept=".txt">
      <span class="upload-label">Adjectives file</span>
      <div class="upload-status" id="adjStatus">Click to upload .txt</div>
      <div class="upload-count" id="adjCount"></div>
    </div>
    <div class="upload-box" id="nounBox">
      <input type="file" id="nounFile" accept=".txt">
      <span class="upload-label">Nouns file</span>
      <div class="upload-status" id="nounStatus">Click to upload .txt</div>
      <div class="upload-count" id="nounCount"></div>
    </div>
  </div>

  <div class="options-row">
    <label class="checkbox-wrap">
      <input type="checkbox" id="addNumber">
      <span>Append a number</span>
    </label>
    <div class="num-range" id="rangeControls" style="display:none">
      <span>1–</span>
      <input type="number" id="numMax" value="999" min="1" max="99999">
    </div>
  </div>

  <button class="btn-generate" id="generateBtn" disabled>Generate 10 Usernames</button>

  <div class="result-box" id="resultBox">
    <span class="placeholder-text" id="placeholderText">LOADING...</span>
  </div>
  <div class="error-msg" id="errorMsg"></div>
</div>

<script>
  let adjectives = [];
  let nouns = [];

  function parseWords(text) {
    return text.split(/\r?\n/).map(w => w.trim()).filter(w => w.length > 0);
  }

  function updateBtn() {
    document.getElementById('generateBtn').disabled = !(adjectives.length && nouns.length);
  }

  function readFile(file, onLoad) {
    const reader = new FileReader();
    reader.onload = e => {
      const words = e.target.result
        .split(/\r?\n/)
        .map(w => w.trim())
        .filter(w => w.length > 0);
      onLoad(words);
    };
    reader.readAsText(file);
  }

  document.getElementById('adjFile').addEventListener('change', function() {
    if (!this.files[0]) return;
    readFile(this.files[0], words => {
      adjectives = words;
      document.getElementById('adjStatus').textContent = this.files[0].name;
      document.getElementById('adjCount').textContent = `${words.length} words loaded`;
      document.getElementById('adjBox').classList.add('loaded');
      updateBtn();
    });
  });

  document.getElementById('nounFile').addEventListener('change', function() {
    if (!this.files[0]) return;
    readFile(this.files[0], words => {
      nouns = words;
      document.getElementById('nounStatus').textContent = this.files[0].name;
      document.getElementById('nounCount').textContent = `${words.length} words loaded`;
      document.getElementById('nounBox').classList.add('loaded');
      updateBtn();
    });
  });

  const addNumberCheckbox = document.getElementById('addNumber');
  addNumberCheckbox.addEventListener('change', function() {
    document.getElementById('rangeControls').style.display = this.checked ? 'flex' : 'none';
  });

  function pick(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function capitalize(s) {
    return s.charAt(0).toUpperCase() + s.slice(1).toLowerCase();
  }

  document.getElementById('generateBtn').addEventListener('click', () => {
    const addNum = addNumberCheckbox.checked;
    const max = parseInt(document.getElementById('numMax').value) || 999;

    const usernames = Array.from({ length: 10 }, () => {
      const adj = capitalize(pick(adjectives));
      const noun = capitalize(pick(nouns));
      let username = adj + noun;
      if (addNum) username += Math.floor(Math.random() * max) + 1;
      return username;
    });

    const resultBox = document.getElementById('resultBox');
    resultBox.classList.add('has-result');
    resultBox.innerHTML = `
      <ul class="username-list">
        ${usernames.map((u, i) => `
          <li class="username-item" id="item-${i}">
            <span class="num-label">${String(i + 1).padStart(2, '0')}</span>
            <span class="username-text">${u}</span>
            <button class="copy-btn" data-username="${u}">copy</button>
          </li>
        `).join('')}
      </ul>
    `;

    // Staggered animation
    usernames.forEach((_, i) => {
      setTimeout(() => {
        const el = document.getElementById(`item-${i}`);
        if (el) el.classList.add('show');
      }, i * 40);
    });

    // Copy buttons
    resultBox.querySelectorAll('.copy-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        navigator.clipboard.writeText(btn.dataset.username).then(() => {
          btn.textContent = 'copied!';
          btn.style.color = 'var(--text)';
          btn.style.borderColor = 'var(--border-strong)';
          setTimeout(() => {
            btn.textContent = 'copy';
            btn.style.color = '';
            btn.style.borderColor = '';
          }, 1500);
        });
      });
    });
  });

  // Load stock lists — runs after full DOM is parsed (script is at end of body)
  function loadStockLists() {
    const stockAdj = parseWords(document.getElementById('stockAdjectives').value);
    const stockNoun = parseWords(document.getElementById('stockNouns').value);
    if (stockAdj.length) {
      adjectives = stockAdj;
      document.getElementById('adjStatus').textContent = 'Using stock list';
      document.getElementById('adjCount').textContent = `${stockAdj.length} words`;
    }
    if (stockNoun.length) {
      nouns = stockNoun;
      document.getElementById('nounStatus').textContent = 'Using stock list';
      document.getElementById('nounCount').textContent = `${stockNoun.length} words`;
    }
    updateBtn();
    const placeholder = document.getElementById('placeholderText');
    placeholder.textContent = (adjectives.length && nouns.length)
      ? 'READY — CLICK GENERATE'
      : 'UPLOAD FILES TO BEGIN';
  }

  // Dark mode toggle
  const themeToggle = document.getElementById('themeToggle');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  if (prefersDark) {
    document.documentElement.classList.add('dark');
    themeToggle.textContent = 'light';
  }
  themeToggle.addEventListener('click', () => {
    const isDark = document.documentElement.classList.toggle('dark');
    themeToggle.textContent = isDark ? 'light' : 'dark';
  });

  loadStockLists();
</script>

</body>
